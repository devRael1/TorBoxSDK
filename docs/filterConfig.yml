apiRules:
  - exclude:
      hasAttribute:
        uid: System.Runtime.CompilerServices.InternalsVisibleToAttribute
  - include:
      uidRegex: ^TorBoxSDK
  - exclude:
      uidRegex: ^TorBoxSDK\..*\.Internal
  - exclude:
      hasAttribute:
        uid: System.ComponentModel.EditorBrowsableAttribute
        ctorArguments:
          - System.ComponentModel.EditorBrowsableState.Never
