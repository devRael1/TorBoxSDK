name: Integration & Live Schema Tests

on:
  workflow_dispatch:
    inputs:
      run_live_schema:
        description: 'Run live schema validation tests'
        required: false
        default: true
        type: boolean
      run_integration:
        description: 'Run integration tests'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  integration-tests:
    name: Integration Tests
    if: inputs.run_integration == true
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Run integration tests
        env:
          TORBOX_API_KEY: ${{ secrets.TORBOX_API_KEY }}
        run: >
          dotnet test tests/TorBoxSDK.IntegrationTests/
          --configuration Release
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: ./test-results/*.trx
          retention-days: 14

  live-schema-validation:
    name: Live Schema Validation
    if: inputs.run_live_schema == true
    runs-on: ubuntu-latest
    environment: testing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Run live schema validation tests
        env:
          TORBOX_API_KEY: ${{ secrets.TORBOX_API_KEY }}
        run: >
          dotnet test tests/TorBoxSDK.SchemaValidationTests/
          --configuration Release
          --logger "trx;LogFileName=live-schema-validation.trx"
          --results-directory ./test-results

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-schema-validation-results
          path: ./test-results/*.trx
          retention-days: 14
